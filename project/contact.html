<body>
    <header class="header-main">
     <div class="title">
        <h2>African Edifices</h2>
     </div>   
    <a id="menu" href="#"></a>
    <nav>
        <ul class="navigation">
            <li><a  href="index.html">Home</a></li>

    </nav>
    
    </header>
    <main>
        <h3>Request Form</h3>
        <form method="get" action="review.html">
            <div class="form-group">
                <label for="productName">site Name</label>
                <select id="productName" name="productName" required>
                    <option value="" disabled selected>Select a site ...</option>
                    </select>
            </div>

            <fieldset class="rating-group">
                <legend>Overall Rating</legend>
                <div class="stars">
                    <div>
                        <label for="star5">☆☆☆☆☆</label>
                        <input type="radio" id="star5" name="rating" value="5" required>
                    </div>
                    <div>
                        <label for="star4">☆☆☆☆</label>
                        <input type="radio" id="star4" name="rating" value="4">
                    </div>

                    <div>
                        <label for="star3">☆☆☆</label>
                        <input type="radio" id="star3" name="rating" value="3">
                    </div>  
                    <div>
                        <label for="star2">☆☆</label>
                        <input type="radio" id="star2" name="rating" value="2">
                    </div>
                    <div>
                        <label for="star1">☆</label>
                        <input type="radio" id="star1" name="rating" value="1">
                    </div> 

                </div>
            </fieldset>

            <div class="form-group">
                <label for="installDate">Date of Installation</label>
                <input type="date" id="installDate" name="installDate" required>
            </div>

            <fieldset>
                <legend>Which features did you find useful in this site? (Check all that apply)</legend>
                <label><input type="checkbox" id="feature1" name="features" value="pleasure"> pleasure</label>
                <label><input type="checkbox" id="feature2" name="features" value="ease-of-use"> Ease of Use</label>
                <label><input type="checkbox" id="feature3" name="features" value="performance"> Performance</label>
                <label><input type="checkbox" id="feature4" name="features" value="design">Design</label>
            </fieldset>
            <label for="comments">Site Review</label>
            <textarea id="comments" name="comments" rows="4" cols="50" placeholder="Share your experience with this product..."></textarea>
            <label for="username">Your Name (optional)</label>
            <input type="text" id="username" name="username" placeholder="Enter your name...">
            <button type="submit">Post Request</button>
        </form> 
        <p><span class="label">Number of Visits: </span><span class="visits"></span></p>
    </main>
    <footer class="social">
        <p>©<span id="year"></span>💥Jackson Eno 💥Nigeria</p>
        <p>last updated: <span id="lastModified"></span></p>
    </footer>
