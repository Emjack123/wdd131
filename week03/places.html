<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="jackson Eno">
    <meta name="description" content="wdd131-Dynamic web fundamentals,taken by jackson eno.this page provides an overview of a place and it wind chill over a certain temperature range.">
      <link rel="preconnect" href="https://fonts.googleapis.com">
   <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
   <link rel="stylesheet" href="styles/places.css">
   <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/places-large.css">
    <script src=" scripts/places.js" defer></script>
    <title>Ephraim utah temple</title>
    

</head>
<body>
    <header>
        <div>
            <h1>Ephraim Utah</h1>
        </div>
    </header>
    <main>
        
        <div class="hero">
            <picture>
                <source srcset="images/hero-large.webp" media="(min-width: 1000px)">
                <source srcset="images/hero-medium.webp" media="(min-width: 500px)">>
                <img src="images/hero-small.webp" alt="Temple name and location" width="500" height="250">
            </picture>
            <div class="section">
                <section class="data">
                    <h2>Data</h2>
                    <p>Area:<span id="area"></span></p>
                    <p>Population:<span id="population"></span></p>
                    <p>Capital:<span id="capital"></span></p>
                    <p>Language:<span id="lang"></span></p>
                    <p>Currency:<span id="currency"></span></p>
                    <p>time-Zone:<span id="timezone"></span></p>
                    <p>calling-code:<span id="call"></span></p>
                    <p>internet-Tld:<span id="tld"></span></p>
                </section>
                
                <section class="weather">
                    <h2>💥 weather</h2>
                    <p>temperature :<span id="temperture"></span></p>
                    <p>condition :<span id="condition"></span></p>
                    <p>wind speed :<span id="wind"></span></p>
                    <p>wind chill :<span id="chill"></span></p>
                </section>
            </div>
            
        </div>

            

        
        



    
    </main>
    <footer class="social">
        <p>©<span id="year"></span>💥Jackson Eno 💥Nigeria</p>
        <p>last updated: <span id="lastModified"></span></p>
    </footer>

    

</body>
</html>
